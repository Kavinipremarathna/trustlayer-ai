<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustLayer AI</title>
    <style>
      :root {
        --bg: #f3eadb;
        --panel: rgba(255, 252, 245, 0.94);
        --panel-strong: #fff8ee;
        --ink: #182127;
        --ink-soft: #62707a;
        --brand: #0d5c63;
        --brand-strong: #083f45;
        --accent: #e07a2f;
        --ok: #1f9d8a;
        --warn: #cb6b18;
        --danger: #ad2e24;
        --border: #dbc7ae;
        --shadow: 0 18px 42px rgba(24, 33, 39, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 0%, #ffd8ab 0%, transparent 36%),
          radial-gradient(circle at 92% 10%, #c7ebe3 0%, transparent 34%),
          radial-gradient(
            circle at 50% 100%,
            rgba(224, 122, 47, 0.12) 0%,
            transparent 40%
          ),
          var(--bg);
        padding: 28px 20px;
      }

      .container {
        width: min(1100px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .hero {
        background: linear-gradient(
          130deg,
          #0a4f55 0%,
          #126a70 48%,
          #1d8f8f 100%
        );
        color: #fff;
        border-radius: 20px;
        padding: 24px;
        box-shadow: var(--shadow);
        transform: translateY(8px);
        opacity: 0;
        animation: riseIn 450ms ease forwards;
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.5rem, 1.2rem + 1.6vw, 2.35rem);
        letter-spacing: 0.02em;
      }

      .hero p {
        margin: 10px 0 0;
        color: #d1f0ec;
        max-width: 70ch;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid rgba(219, 199, 174, 0.9);
        border-radius: 16px;
        padding: 18px;
        box-shadow: var(--shadow);
        transform: translateY(8px);
        opacity: 0;
        animation: riseIn 450ms ease forwards;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }

      .card:nth-child(1) {
        animation-delay: 90ms;
      }

      .card:nth-child(2) {
        animation-delay: 170ms;
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 1.2rem;
        color: var(--brand-strong);
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .scope-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      input[type="file"],
      input[type="text"],
      select {
        border: 1px solid #cdb8a3;
        border-radius: 10px;
        padding: 12px;
        font-size: 0.95rem;
        background: #fff;
        color: var(--ink);
      }

      input[type="text"]:focus,
      input[type="file"]:focus,
      select:focus {
        outline: 2px solid #8dd5cd;
        outline-offset: 1px;
      }

      .btn {
        border: none;
        border-radius: 11px;
        padding: 12px 16px;
        color: #fff;
        background: linear-gradient(160deg, var(--brand) 0%, #14969c 100%);
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 120ms ease,
          filter 120ms ease;
      }

      .btn:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }

      .result {
        background: var(--panel-strong);
        border: 1px solid rgba(219, 199, 174, 0.9);
        border-radius: 16px;
        padding: 18px;
        box-shadow: var(--shadow);
        min-height: 180px;
      }

      .result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .result-head h3 {
        margin: 0;
        font-size: 1.05rem;
        color: var(--brand-strong);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #fff;
        background: var(--ink-soft);
      }

      .chip.safe {
        background: var(--ok);
      }

      .chip.suspicious {
        background: var(--warn);
      }

      .chip.dangerous {
        background: var(--danger);
      }

      .score-banner {
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        gap: 16px;
        border-radius: 16px;
        padding: 16px 18px;
        margin: 10px 0 14px;
        color: #fff;
        background: linear-gradient(
          135deg,
          rgba(13, 92, 99, 0.95),
          rgba(20, 150, 156, 0.95)
        );
      }

      .score-banner.suspicious {
        background: linear-gradient(
          135deg,
          rgba(203, 107, 24, 0.95),
          rgba(224, 122, 47, 0.95)
        );
      }

      .score-banner.dangerous {
        background: linear-gradient(
          135deg,
          rgba(173, 46, 36, 0.95),
          rgba(201, 74, 56, 0.95)
        );
      }

      .score-label {
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.72rem;
        opacity: 0.85;
      }

      .score-value {
        margin: 4px 0 0;
        font-size: 2.2rem;
        line-height: 1;
        font-weight: 800;
      }

      .score-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        gap: 6px;
        font-size: 0.9rem;
        opacity: 0.92;
      }

      .summary {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
        color: var(--ink-soft);
        font-size: 0.95rem;
      }

      .signal-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin: 14px 0;
      }

      .signal-card {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid #dcc9b0;
        border-radius: 12px;
        padding: 12px;
      }

      .signal-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .signal-points {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 48px;
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(13, 92, 99, 0.12);
        color: var(--brand-strong);
        font-weight: 800;
      }

      .signal-rule {
        font-size: 0.82rem;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .signal-card p {
        margin: 0;
        color: var(--ink);
        font-weight: 600;
      }

      .signal-card small {
        display: block;
        margin-top: 8px;
        color: var(--ink-soft);
      }

      .reason-list {
        margin: 8px 0 0;
        padding-left: 18px;
        color: var(--ink-soft);
      }

      .recommend-list {
        margin: 8px 0 0;
        padding-left: 18px;
        color: #3d4b52;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 12px 0;
      }

      .meta-box {
        background: #f5f0e6;
        border: 1px solid #decebc;
        border-radius: 10px;
        padding: 10px;
      }

      .meta-title {
        margin: 0;
        font-size: 0.78rem;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .meta-value {
        margin: 4px 0 0;
        font-size: 1rem;
        color: var(--brand-strong);
        font-weight: 700;
      }

      .raw {
        margin: 12px 0 0;
        background: #f4eee3;
        border-radius: 10px;
        padding: 10px;
        overflow-x: auto;
        white-space: pre-wrap;
        font-size: 0.84rem;
      }

      .muted {
        color: var(--ink-soft);
        margin: 0;
      }

      @keyframes riseIn {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @media (max-width: 860px) {
        body {
          padding: 20px 14px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .meta-grid {
          grid-template-columns: 1fr;
        }

        .signal-grid {
          grid-template-columns: 1fr;
        }

        .score-banner {
          flex-direction: column;
        }

        .score-copy {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>TrustLayer AI Scanner</h1>
        <p>
          Scan files and URLs for early risk signals. Fast checks, readable
          scoring, and clear reasons.
        </p>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Scan File</h2>
          <div class="field">
            <div class="scope-row">
              <label for="scopeInput">Analysis Scope</label>
              <select id="scopeInput">
                <option value="quick">Quick</option>
                <option value="balanced" selected>Balanced</option>
                <option value="strict">Strict</option>
              </select>
            </div>
            <label for="fileInput">Choose file</label>
            <input type="file" id="fileInput" />
            <button class="btn" onclick="uploadFile()">Analyze File</button>
          </div>
        </article>

        <article class="card">
          <h2>Scan URL</h2>
          <div class="field">
            <label for="urlInput">Enter URL</label>
            <input
              type="text"
              id="urlInput"
              placeholder="https://example.com/login"
            />
            <button class="btn" onclick="scanURL()">Analyze URL</button>
          </div>
        </article>
      </section>

      <section class="result" id="output" aria-live="polite">
        <div class="result-head">
          <h3>Latest Result</h3>
          <span class="chip">Waiting</span>
        </div>
        <p class="muted">Run a scan to see analysis details and risk score.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
